name: Plugin Check
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none

      - name: Install Node dependencies
        run: npm install --production=false

      - name: Install Composer dependencies
        run: composer install --no-dev -o

      - name: Build plugin
        run: npm run build

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          exclude-directories: |
            tests
            bin
            .github
            .wordpress-org
            node_modules
            vendor
          exclude-files: |
            .phpcs.xml.dist
            .gitignore
            .distignore
            .editorconfig
            composer.json
            composer.lock
            package.json
            package-lock.json
            phpunit.xml
            phpunit.xml.dist
            phpcs.xml
          ignore-codes: |
            WordPress.WP.I18n.NonSingularStringLiteralDomain
            WordPress.NamingConventions.PrefixAllGlobals.NonPrefixedVariableFound
            WordPress.NamingConventions.PrefixAllGlobals.NonPrefixedHooknameFound
